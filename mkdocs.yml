site_name: graphreduce
site_url: https://github.com/wesmadrigal/graphreduce
repo_url: https://github.com/wesmadrigal/GraphReduce
repo_name: wesmadrigal/GraphReduce
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky

nav:
  - Home: index.md
  - Fundamentals:
    - fundamentals/index.md
    - Operations Pipeline: fundamentals/operations.md
    - Joins and Cardinality: fundamentals/joins_and_cardinality.md
    - Time Windows and Leakage Safety: fundamentals/time_and_leakage.md
  - Abstractions: abstractions.md
  - End-to-End Examples:
    - end_to_end_examples/index.md
    - Hello World: end_to_end_examples/hello_world.md
    - Preserve Child Grain: end_to_end_examples/preserve_child_grain.md
    - Multi-Backend Examples:
      - "cust+notifications: pandas, sqlite, duckdb, pyspark, snowflake SQL, databricks SQL": end_to_end_examples/multi_backend_cust_notifications.md
      - "custom pyspark: all cust_data nodes": end_to_end_examples/custom_pyspark_all_nodes.md
      - "custom pandas: all cust_data nodes": end_to_end_examples/custom_pandas_all_nodes.md
      - "custom duckdb: all cust_data nodes": end_to_end_examples/custom_duckdb_all_nodes.md
    - All Tables Reduced with ML Targets: end_to_end_examples/all_tables_reduce_with_labels.md
    - Predictive AI with XGBoost: end_to_end_examples/predictive_ai_xgboost.md
    - Predictive AI with TabPFN: end_to_end_examples/predictive_ai_tabpfn.md
    - RelBench Tasks:
      - "rel-stack: user-badges (classification)": end_to_end_examples/relbench_rel_stack_badges_duckdb.md
      - "rel-stack: post-votes (regression)": end_to_end_examples/relbench_rel_stack_post_votes_duckdb.md
      - "rel-stack: user-engagement (classification)": end_to_end_examples/relbench_rel_stack_user_engagement_duckdb.md
      - "rel-trial: study-outcome (classification)": end_to_end_examples/relbench_rel_trial_study_outcome_duckdb.md
      - "rel-hm: user-churn (classification)": end_to_end_examples/relbench_rel_hm_user_churn_duckdb.md
      - "rel-hm: item-sales (regression)": end_to_end_examples/relbench_rel_hm_item_sales_duckdb.md
      - "rel-avito: user-clicks (classification)": end_to_end_examples/relbench_rel_avito_user_clicks_duckdb.md
      - "rel-avito: user-visits (classification)": end_to_end_examples/relbench_rel_avito_user_visits_duckdb.md
      - "rel-avito: ad-ctr (regression)": end_to_end_examples/relbench_rel_avito_ad_ctr_duckdb.md
      - "rel-amazon: user-churn (classification)": end_to_end_examples/relbench_rel_amazon_user_churn_duckdb.md
      - "rel-amazon: item-churn (classification)": end_to_end_examples/relbench_rel_amazon_item_churn_duckdb.md
      - "rel-amazon: user-ltv (regression)": end_to_end_examples/relbench_rel_amazon_user_ltv_duckdb.md
      - "rel-amazon: item-ltv (regression)": end_to_end_examples/relbench_rel_amazon_item_ltv_duckdb.md
  - Tutorial:
    - tutorial_index.md
    - tutorial_time.md
    - tutorial_custom_graph.md
    - tutorial_swapping_compute.md
    - tutorial_sql_dialects.md
    - tutorial_sql_backends_dynamic_queries.md
    - tutorial_method_deps.md
    - tutorial_auto_feature_engineering.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - assets/css/modal_runner.css

extra_javascript:
  - assets/js/modal_runner.js
