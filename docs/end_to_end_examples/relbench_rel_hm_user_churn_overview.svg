<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="940" viewBox="0 0 1480 940">
  <defs>
    <style>
      .title { font: 700 31px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #334e68; }
      .section { font: 700 18px Arial, sans-serif; fill: #102a43; }
      .label { font: 700 14px Arial, sans-serif; fill: #102a43; }
      .text { font: 12px Arial, sans-serif; fill: #243b53; }
      .small { font: 11px Arial, sans-serif; fill: #486581; }
      .mono { font: 12px "Courier New", monospace; fill: #1f2933; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,4 L0,8 z" fill="#334e68"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,4 L0,8 z" fill="#12734a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1480" height="940" fill="#f7fafc"/>
  <text x="40" y="54" class="title">RelBench rel-hm in DuckDB with User Churn Target</text>
  <text x="40" y="82" class="subtitle">Customer parent node with transactions as label node, article context, and binary churn output at customer grain.</text>

  <rect x="34" y="112" width="560" height="600" rx="14" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.5"/>
  <text x="54" y="142" class="section">1) Graph Model and Node Roles</text>

  <rect x="210" y="176" width="210" height="126" rx="10" fill="#e7f0ff" stroke="#486581"/>
  <text x="226" y="200" class="label">Parent: customer.parquet</text>
  <text x="226" y="220" class="text">prefix: cust, pk: customer_id</text>
  <text x="226" y="238" class="text">prediction grain: one row per customer</text>
  <text x="226" y="256" class="text">active-customer filter before cut</text>
  <text x="226" y="274" class="mono">exists(txn before 2020-09-14)</text>

  <rect x="70" y="392" width="210" height="126" rx="10" fill="#e8fff1" stroke="#486581"/>
  <text x="86" y="416" class="label">transactions.parquet</text>
  <text x="86" y="434" class="text">prefix: txn, label node</text>
  <text x="86" y="452" class="text">date_key: t_dat</text>
  <text x="86" y="470" class="text">reduce=True to customer</text>

  <rect x="350" y="392" width="210" height="126" rx="10" fill="#eef2ff" stroke="#486581"/>
  <text x="366" y="416" class="label">article.parquet</text>
  <text x="366" y="434" class="text">prefix: art, pk: article_id</text>
  <text x="366" y="452" class="text">joined to transactions</text>
  <text x="366" y="470" class="text">reduce=True via txn grain</text>

  <line x1="260" y1="302" x2="175" y2="392" stroke="#334e68" stroke-width="2.1" marker-end="url(#arrow)"/>
  <line x1="370" y1="302" x2="455" y2="392" stroke="#334e68" stroke-width="2.1" marker-end="url(#arrow)"/>

  <rect x="620" y="112" width="390" height="260" rx="14" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.5"/>
  <text x="640" y="142" class="section">2) Time and Label Configuration</text>
  <rect x="646" y="168" width="340" height="46" rx="8" fill="#f0f4f8" stroke="#9fb3c8"/>
  <text x="662" y="196" class="mono">cut_date = 2020-09-14</text>
  <rect x="646" y="224" width="340" height="50" rx="8" fill="#e6fffa" stroke="#2c7a7b"/>
  <text x="662" y="244" class="label">X window: from 2018-09-20</text>
  <text x="662" y="262" class="mono">LOOKBACK_DAYS = 725 (inclusive start)</text>
  <rect x="646" y="284" width="340" height="50" rx="8" fill="#fffaf0" stroke="#b7791f"/>
  <text x="662" y="304" class="label">y window: 7 days forward</text>
  <text x="662" y="322" class="mono">target: user_churn_7d = no transactions</text>

  <rect x="620" y="392" width="390" height="320" rx="14" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.5"/>
  <text x="640" y="422" class="section">3) Compute Graph Pipeline in DuckDB</text>
  <text x="640" y="450" class="text">A) Download rel-hm parquet tables from S3.</text>
  <text x="640" y="474" class="text">B) Build DuckdbNode objects for customer/article/txn.</text>
  <text x="640" y="498" class="text">C) Add edges and run `gr.do_transformations_sql()`.</text>
  <text x="640" y="522" class="text">D) Derive churn target from txn_*_label columns.</text>
  <text x="640" y="546" class="text">E) Train RandomForest and score ROC AUC.</text>
  <rect x="642" y="566" width="346" height="124" rx="8" fill="#edf2f7" stroke="#a0aec0"/>
  <text x="658" y="592" class="mono">out_df = con.sql(...).to_df()</text>
  <text x="658" y="614" class="mono">target = (sum(txn_*_label)==0)</text>
  <text x="658" y="636" class="mono">X = numeric non-label features</text>
  <text x="658" y="658" class="mono">model = RandomForestClassifier</text>

  <rect x="1040" y="112" width="408" height="600" rx="14" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.5"/>
  <text x="1060" y="142" class="section">4) Output at Parent Grain and Why This Setup</text>
  <rect x="1062" y="170" width="364" height="262" rx="10" fill="#f8fafc" stroke="#829ab1"/>
  <text x="1080" y="198" class="label">Output columns (customer grain)</text>
  <text x="1080" y="224" class="mono">cust_* identity/profile features</text>
  <text x="1080" y="248" class="mono">txn_* aggregated history features</text>
  <text x="1080" y="272" class="mono">art_* propagated item context</text>
  <text x="1080" y="296" class="mono">txn_*_label forward-window labels</text>
  <text x="1080" y="320" class="mono">user_churn_7d target</text>
  <text x="1080" y="354" class="text">Directly usable as modeling frame.</text>

  <rect x="1062" y="450" width="364" height="240" rx="10" fill="#e7fff5" stroke="#2f855a"/>
  <text x="1080" y="478" class="label">Why this setup</text>
  <text x="1080" y="504" class="text">Matches customer-level churn definition.</text>
  <text x="1080" y="528" class="text">Recent 2-year history captures seasonality.</text>
  <text x="1080" y="552" class="text">Transactions provide both features and labels.</text>
  <text x="1080" y="576" class="text">Article table adds product-side signal.</text>
  <text x="1080" y="610" class="mono">graphreduce + duckdb => train-ready output</text>

  <line x1="594" y1="430" x2="620" y2="450" stroke="#334e68" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="560" x2="1040" y2="560" stroke="#12734a" stroke-width="2.6" marker-end="url(#arrowGreen)"/>

  <text x="40" y="908" class="small">Specific to rel-hm user churn setup with customer parent grain and 7-day transaction label horizon.</text>
</svg>
